<%+header%>
<h2><%:Server Peers%></h2>

<style>
.peer-container {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
}
.peer-table {
    min-width: 900px;
    border-collapse: collapse;
}
.peer-table th, .peer-table td {
    padding: 8px;
    border: 1px solid #ddd;
    text-align: left;
    vertical-align: middle;
}
.peer-table th {
    background-color: #f2f2f2;
}
.peer-table input, .peer-table select {
    width: 100%;
    padding: 4px;
    box-sizing: border-box;
}
.peer-table input[type="checkbox"] {
    width: auto;
}
.actions {
    white-space: nowrap;
    text-align: center;
}
.actions a, .actions button {
    margin: 0 4px;
    cursor: pointer;
    padding: 4px 8px;
    border: none;
    border-radius: 3px;
}
.btn-save {
    background-color: #5cb85c;
    color: white;
}
.btn-delete {
    background-color: #d9534f;
    color: white;
}
.hint {
    margin: 10px 0;
    padding: 8px 12px;
    background: #e8f4e8;
    border-left: 4px solid #5cb85c;
    border-radius: 3px;
    color: #3c763d;
    font-size: 12px;
}
.add-area {
    margin: 20px 0;
    padding: 15px;
    background: #e8f4e8;
    border: 1px solid #5cb85c;
    border-radius: 5px;
    overflow-x: auto;
}
.add-row {
    display: flex;
    gap: 8px;
    align-items: center;
    min-width: 900px;
}
.add-row .c-name { width: 100px; flex-shrink: 0; }
.add-row .c-prefix { width: 50px; flex-shrink: 0; }
.add-row .c-host { width: 140px; flex-shrink: 0; }
.add-row .c-port { width: 60px; flex-shrink: 0; }
.add-row .c-type { width: 90px; flex-shrink: 0; }
.add-row .c-context { width: 70px; flex-shrink: 0; }
.add-row .c-nat { width: 50px; flex-shrink: 0; text-align: center; }
.add-row .c-qualify { width: 50px; flex-shrink: 0; text-align: center; }
.add-row .c-dtmf { width: 90px; flex-shrink: 0; }
.add-row .c-actions { width: 100px; flex-shrink: 0; }
.add-row input, .add-row select {
    width: 100%;
    padding: 4px;
    box-sizing: border-box;
}
</style>

<script type="text/javascript">
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function savePeer(name, rowId) {
    var data = {
        name: document.getElementById('name_' + rowId).value,
        dial_prefix: document.getElementById('prefix_' + rowId).value,
        host: document.getElementById('host_' + rowId).value,
        port: document.getElementById('port_' + rowId).value,
        type: document.getElementById('type_' + rowId).value,
        context: document.getElementById('context_' + rowId).value,
        nat: document.getElementById('nat_' + rowId).checked ? '1' : '0',
        qualify: document.getElementById('qualify_' + rowId).checked ? '1' : '0',
        dtmf: document.getElementById('dtmf_' + rowId).value
    };
    
    var url = '<%=luci.dispatcher.build_url("admin", "services", "voip", "peer_update")%>';
    var params = 'data=' + encodeURIComponent(JSON.stringify(data));
    
    var xhr = new XMLHttpRequest();
    xhr.open('POST', url, true);
    xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
    xhr.onreadystatechange = function() {
        if (xhr.readyState == 4 && xhr.status == 200) {
            location.reload();
        }
    };
    xhr.send(params);
}

function deletePeer(name) {
    if (!name) return;
    if (confirm('<%:Delete server peer%> ' + name + '?')) {
        window.location.href = '<%=luci.dispatcher.build_url("admin", "services", "voip", "peer_delete")%>?name=' + encodeURIComponent(name);
    }
}

function renderTable(peers) {
    var html = '<div class="peer-container">';
    html += '<table class="peer-table">';
    html += '<thead>';
    html += '<tr>';
    html += '<th style="width:100px"><%:Server Name%></th>';
    html += '<th style="width:50px"><%:Prefix%></th>';
    html += '<th style="width:140px"><%:Host/IP%></th>';
    html += '<th style="width:60px"><%:Port%></th>';
    html += '<th style="width:90px"><%:Type%></th>';
    html += '<th style="width:70px"><%:Context%></th>';
    html += '<th style="width:50px"><%:NAT%></th>';
    html += '<th style="width:50px"><%:Qualify%></th>';
    html += '<th style="width:90px"><%:DTMF Mode%></th>';
    html += '<th style="width:150px"><%:Actions%></th>';
    html += '</tr>';
    html += '</thead><tbody>';
    
    for (var i = 0; i < peers.length; i++) {
        var p = peers[i];
        var rowId = i + 1;
        html += '<tr>';
        html += '<td><input type="text" id="name_' + rowId + '" value="' + escapeHtml(p.name) + '" /></td>';
        html += '<td><input type="text" id="prefix_' + rowId + '" value="' + escapeHtml(p.dial_prefix) + '" /></td>';
        html += '<td><input type="text" id="host_' + rowId + '" value="' + escapeHtml(p.host) + '" /></td>';
        html += '<td><input type="text" id="port_' + rowId + '" value="' + escapeHtml(p.port) + '" /></td>';
        html += '<td><select id="type_' + rowId + '">';
        html += '<option value="friend"' + (p.type == 'friend' ? ' selected' : '') + '><%:Friend%></option>';
        html += '<option value="peer"' + (p.type == 'peer' ? ' selected' : '') + '><%:Peer%></option>';
        html += '<option value="user"' + (p.type == 'user' ? ' selected' : '') + '><%:User%></option>';
        html += '</select></td>';
        html += '<td><input type="text" id="context_' + rowId + '" value="' + escapeHtml(p.context) + '" /></td>';
        html += '<td style="text-align:center"><input type="checkbox" id="nat_' + rowId + '" value="1"' + (p.nat == '1' ? ' checked' : '') + ' /></td>';
        html += '<td style="text-align:center"><input type="checkbox" id="qualify_' + rowId + '" value="1"' + (p.qualify == '1' ? ' checked' : '') + ' /></td>';
        html += '<td><select id="dtmf_' + rowId + '">';
        html += '<option value="rfc2833"' + (p.dtmfmode == 'rfc2833' ? ' selected' : '') + '>RFC2833</option>';
        html += '<option value="info"' + (p.dtmfmode == 'info' ? ' selected' : '') + '><%:SIP INFO%></option>';
        html += '<option value="inband"' + (p.dtmfmode == 'inband' ? ' selected' : '') + '><%:Inband%></option>';
        html += '</select></td>';
        html += '<td class="actions">';
        html += '<button class="btn-save" onclick="savePeer(\'' + escapeHtml(p.name) + '\', ' + rowId + ')"><%:Save%></button>';
        html += '<button class="btn-delete" onclick="deletePeer(\'' + escapeHtml(p.name) + '\')"><%:Delete%></button>';
        html += '</td>';
        html += '</tr>';
    }
    
    html += '</tbody>';
    html += '</table>';
    html += '</div>';
    
    document.getElementById('peer-table-container').innerHTML = html;
}

function loadPeers() {
    var url = '<%=luci.dispatcher.build_url("admin", "services", "voip", "peer_data")%>';
    XHR.get(url, null,
        function(xhr) {
            var peers = JSON.parse(xhr.responseText);
            renderTable(peers);
        },
        function() {
            renderTable([]);
        }
    );
}

window.addEventListener('load', function() {
    loadPeers();
});
</script>

<div class="hint">
    <strong><%:About Dial Prefix%></strong><br>
    <%:Dial prefix to route calls to this server (e.g., 81 for extension 816001).%><br>
</div>

<div id="peer-table-container"></div>

<div class="add-area">
    <div style="font-weight: bold; margin-bottom: 10px;"><%:Add New Server Peer%></div>
    <div class="add-row">
        <input type="text" name="new_name" placeholder="<%:Server Name%>" class="c-name" />
        <input type="text" name="new_prefix" placeholder="<%:Prefix%>" class="c-prefix" />
        <input type="text" name="new_host" placeholder="<%:Host/IP%>" class="c-host" />
        <input type="text" name="new_port" placeholder="<%:Port%>" value="5060" class="c-port" />
        <select name="new_type" class="c-type">
            <option value="friend"><%:Friend%></option>
            <option value="peer"><%:Peer%></option>
            <option value="user"><%:User%></option>
        </select>
        <input type="text" name="new_context" placeholder="<%:Context%>" value="internal" class="c-context" />
        <label class="c-nat"><input type="checkbox" name="new_nat" value="1" checked /> <%:NAT%></label>
        <label class="c-qualify"><input type="checkbox" name="new_qualify" value="1" checked /> <%:Qualify%></label>
        <select name="new_dtmf" class="c-dtmf">
            <option value="rfc2833">RFC2833</option>
            <option value="info"><%:SIP INFO%></option>
            <option value="inband"><%:Inband%></option>
        </select>
        <input type="submit" value="<%:Save New Peer%>" class="c-actions" style="background:#5cb85c; color:white; border:none; padding:6px 12px; cursor:pointer;" onclick="addNewPeer()" />
    </div>
</div>

<div class="cbi-page-actions">
    <input class="cbi-button cbi-button-reload" type="button" value="<%:Refresh%>" onclick="loadPeers()" />
    <input class="cbi-button cbi-button-reset" type="button" value="<%:Back to Status%>" onclick="window.location='<%=luci.dispatcher.build_url('admin/services/voip/status')%>'" />
</div>

<script>
function addNewPeer() {
    var data = {
        name: document.querySelector('input[name="new_name"]').value,
        dial_prefix: document.querySelector('input[name="new_prefix"]').value,
        host: document.querySelector('input[name="new_host"]').value,
        port: document.querySelector('input[name="new_port"]').value,
        type: document.querySelector('select[name="new_type"]').value,
        context: document.querySelector('input[name="new_context"]').value,
        nat: document.querySelector('input[name="new_nat"]').checked ? '1' : '0',
        qualify: document.querySelector('input[name="new_qualify"]').checked ? '1' : '0',
        dtmf: document.querySelector('select[name="new_dtmf"]').value
    };
    
    if (!data.name || !data.host) {
        alert('<%:Server Name and Host/IP are required%>');
        return;
    }
    
    var url = '<%=luci.dispatcher.build_url("admin", "services", "voip", "peer_add")%>';
    var params = 'data=' + encodeURIComponent(JSON.stringify(data));
    
    var xhr = new XMLHttpRequest();
    xhr.open('POST', url, true);
    xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
    xhr.onreadystatechange = function() {
        if (xhr.readyState == 4 && xhr.status == 200) {
            location.reload();
        }
    };
    xhr.send(params);
}
</script>

<%+footer%>
